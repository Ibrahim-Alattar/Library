<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <h2>My Library</h2>
    <button id="createBook">Add New Book</button>
  </header>
  <section id="form">
    <div class="form-control">
      <label for="author">Author name</label>
      <input type="text" name="author" id="author" placeholder="Enter the author name" required>
    </div>

    <div class="form-control">
      <label for="title">Book Title</label>
      <input type="text" name="title" id="title" placeholder="Enter the book title" required>
    </div>

    <div class="form-control">
      <label for="pagesNumber">Pages number</label>
      <input type="number" name="pagesNumber" id="pagesNumber" placeholder="Enter pages number" required>
    </div>

    <div class="form-control">
      <label for="readStatus">Read Status</label>
      <input type="text" name="readStatus" id="readStatus" placeholder="Have you read it yet?" required>
    </div>

    <div class="form-control">
      <label for="bookCover">Book Cover</label>
      <input type="file" name="bookCover" id="bookCover" accept="image/*">
    </div>

    <div class="form-control">
      <label for="bookFile">Upload Book</label>
      <input type="file" name="bookFile" id="bookFile" accept=".pdf,.epub,.doc,.docx">
    </div>

    <p id="message"></p>

    <button id="addBook">Add Book</button>
  </section>
  <section class="books-container">

  </section>
  <script src="script.js"></script>
</body>

</html>
